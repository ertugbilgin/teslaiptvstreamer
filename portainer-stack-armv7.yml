services:
  tesla-iptv:
    image: node:18-alpine
    container_name: tesla-iptv-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - /opt/tesla-iptv:/app
    environment:
      - NODE_ENV=production
      - PORT=3000
    command: node /app/proxy-server.js
    networks:
      - tesla-network
    # Cloudflared host üzerinden çalışacak

networks:
  tesla-network:
    driver: bridge
