<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Tesla IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 15px; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 20px; border-radius: 16px; margin-bottom: 15px; text-align: center; }
        .header h1 { font-size: 24px; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .domain-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); padding: 8px 16px; border-radius: 20px; font-size: 13px; color: #00d4ff; margin-top: 10px; }
        .player-section { background: #1a1a1a; border-radius: 16px; overflow: hidden; margin-bottom: 15px; }
        #videoContainer { position: relative; background: #000; aspect-ratio: 16/9; display: none; }
        #video { width: 100%; height: 100%; object-fit: contain; }
        .player-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; background: #252525; border-bottom: 1px solid #333; }
        .player-title { font-size: 14px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 10px; }
        .live-badge { background: #ff4444; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .player-btn { background: #333; border: none; color: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
        .player-btn:hover { background: #444; }
        .player-btn.active { background: #ff4444; }
        .setup-section { background: #1a1a1a; padding: 20px; border-radius: 16px; margin-bottom: 15px; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input { width: 100%; padding: 14px; border: 1px solid #333; border-radius: 10px; background: #252525; color: #fff; font-size: 15px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%); color: #fff; }
        .filters { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .filter-btn { padding: 10px 18px; border: 1px solid #333; border-radius: 20px; background: #1a1a1a; color: #888; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .filter-btn:hover, .filter-btn.active { background: #00d4ff; color: #000; border-color: #00d4ff; }
        .search-box { margin-bottom: 15px; }
        .search-box input { width: 100%; padding: 14px 20px; border: 1px solid #333; border-radius: 10px; background: #1a1a1a; color: #fff; font-size: 15px; }
        .channels-section { background: #1a1a1a; padding: 20px; border-radius: 16px; }
        .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .channel-card { background: #252525; border-radius: 12px; padding: 12px 8px; cursor: pointer; transition: all 0.2s; text-align: center; border: 2px solid transparent; }
        .channel-card:hover { transform: translateY(-3px); border-color: #00d4ff; background: #2a2a2a; }
        .channel-card.active { border-color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
        .channel-logo { width: 36px; height: 36px; object-fit: contain; margin-bottom: 8px; border-radius: 6px; background: #333; }
        .channel-name { font-size: 11px; font-weight: 500; color: #fff; line-height: 1.4; min-height: 44px; display: flex; align-items: center; justify-content: center; }
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.active { display: block; }
        .spinner { width: 50px; height: 50px; border: 3px solid #333; border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 Tesla IPTV</h1>
            <p style="color: #888; font-size: 14px;">Araç içi IPTV yayını</p>
            <div class="domain-badge">🌐 iptv.evmcp.shop</div>
        </div>
        <div class="player-section">
            <div id="videoContainer"><video id="video" controls playsinline></video></div>
            <div class="player-header" id="playerHeader" style="display: none;">
                <div class="player-title"><span class="live-badge">CANLI</span><span id="currentChannelName">Kanal Seçilmedi</span></div>
                <button class="player-btn" id="favBtn" onclick="toggleCurrentFavorite()"><span id="favIcon">🤍</span> Favori</button>
            </div>
        </div>
        <div class="setup-section" id="setupSection">
            <div class="input-group"><label>🔗 M3U Playlist URL</label><input type="text" id="m3uUrl" placeholder="https://ornek.com/playlist.m3u"></div>
            <div class="input-group"><label>📋 Veya M3U Dosya İçeriği</label><input type="file" id="m3uFile" accept=".m3u,.m3u8" style="padding: 10px;"></div>
            <button class="btn btn-primary" onclick="loadPlaylist()">📺 Kanalları Yükle</button>
        </div>
        <div class="loading" id="loading"><div class="spinner"></div><p>Kanallar yükleniyor...</p></div>
        <div class="channels-section" id="channelsSection" style="display: none;">
            <div class="filters">
                <button class="filter-btn active" onclick="filterChannels('all')">Tümü</button>
                <button class="filter-btn" onclick="filterChannels('favorites')">❤️ Favoriler</button>
                <button class="filter-btn" onclick="filterChannels('recent')">🕐 Son İzlenen</button>
            </div>
            <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Kanal ara..." oninput="searchChannels()"></div>
            <div class="channels-grid" id="channelsGrid"></div>
        </div>
    </div>
    <script>
        let channels=[], favorites=JSON.parse(localStorage.getItem('favorites')||'[]'), recentChannels=JSON.parse(localStorage.getItem('recentChannels')||'[]'), currentFilter='all', currentChannel=null, hls=null;
        async function loadPlaylist(){const e=document.getElementById("m3uUrl"),t=document.getElementById("m3uFile"),n=document.getElementById("loading"),l=document.getElementById("setupSection"),a=document.getElementById("channelsSection");let d="";if(n.classList.add("active"),l.style.display="none",t.files.length>0)d=await t.files[0].text();else{if(!e.value.trim())throw new Error("Lütfen M3U URL veya dosya girin");{const t=await fetch("/proxy?url="+encodeURIComponent(e.value.trim()));d=await t.text()}}channels=function(e){const t=e.split("\n"),n=[];let l=null;for(const e of t){const t=e.trim();if(t.startsWith("#EXTINF:")){const e=t.match(/tvg-name="([^"]+)"/),n=t.match(/tvg-logo="([^"]+)"/),a=t.match(/tvg-id="([^"]+)"/);let d=t.split(",").pop()||"Bilinmeyen Kanal";e&&(d=e[1]),l={id:a?a[1]:d,name:d,logo:n?n[1]:null,url:null}}else t&&!t.startsWith("#")&&l&&(l.url=t,n.push(l),l=null)}return n}(d),n.classList.remove("active"),a.style.display="block",renderChannels()}
        function renderChannels(){const e=document.getElementById("channelsGrid"),t=document.getElementById("searchInput").value.toLowerCase();let n=channels;"favorites"===currentFilter?n=channels.filter((e=>favorites.includes(e.name))):"recent"===currentFilter&&(n=recentChannels.map((e=>channels.find((t=>t.name===e)))).filter(Boolean)),t&&(n=n.filter((e=>e.name.toLowerCase().includes(t)))),e.innerHTML=n.length?n.map((e=>{const t=favorites.includes(e.name),n=currentChannel===e.name;return`<div class="channel-card ${n?"active":""}" onclick="playChannel('${e.name}')">${e.logo?`<img src="${e.logo}" class="channel-logo" alt="" onerror="this.style.display='none'">`:""}<div class="channel-name">${e.name}</div></div>`})).join(""):'<div style="text-align:center;padding:40px;color:#666;"><div style="font-size:48px;margin-bottom:15px;opacity:0.5;">📺</div><p>Kanal bulunamadı</p></div>'}
        async function playChannel(e){const t=channels.find((t=>t.name===e));if(t){if(currentChannel=e,document.getElementById("videoContainer").style.display="block",document.getElementById("playerHeader").style.display="flex",document.getElementById("currentChannelName").textContent=t.name,function(){const e=document.getElementById("favBtn"),t=document.getElementById("favIcon");favorites.includes(currentChannel)?(e.classList.add("active"),t.textContent="❤️"):(e.classList.remove("active"),t.textContent="🤍")}(),renderChannels(),recentChannels=recentChannels.filter((t=>t!==e)),recentChannels.unshift(e),recentChannels.length>10&&(recentChannels=recentChannels.slice(0,10)),localStorage.setItem("recentChannels",JSON.stringify(recentChannels)),hls&&(hls.destroy(),hls=null),t.url.includes(".m3u8")||t.url.includes("hls"))if(Hls.isSupported()){hls=new Hls({maxBufferLength:30,maxMaxBufferLength:60,enableWorker:!0});const e="/stream-proxy?url="+encodeURIComponent(t.url);hls.loadSource(e),hls.attachMedia(document.getElementById("video")),hls.on(Hls.Events.MANIFEST_PARSED,(()=>{document.getElementById("video").play().catch((()=>{}))}))}else document.getElementById("video").src=t.url,document.getElementById("video").play().catch((()=>{}));else document.getElementById("video").src=t.url,document.getElementById("video").play().catch((()=>{}));document.getElementById("videoContainer").scrollIntoView({behavior:"smooth"})}}
        function toggleCurrentFavorite(){if(currentChannel){const e=favorites.indexOf(currentChannel);e>-1?favorites.splice(e,1):favorites.push(currentChannel),localStorage.setItem("favorites",JSON.stringify(favorites)),function(){const e=document.getElementById("favBtn"),t=document.getElementById("favIcon");favorites.includes(currentChannel)?(e.classList.add("active"),t.textContent="❤️"):(e.classList.remove("active"),t.textContent="🤍")}(),renderChannels()}}
        function filterChannels(e){currentFilter=e,document.querySelectorAll(".filter-btn").forEach((t=>{t.classList.remove("active"),(t.textContent.toLowerCase().includes("tümü")&&"all"===e||t.textContent.toLowerCase().includes("favori")&&"favorites"===e||t.textContent.toLowerCase().includes("son")&&"recent"===e)&&t.classList.add("active")})),renderChannels()}
        function searchChannels(){renderChannels()}
    </script>
</body>
</html>
