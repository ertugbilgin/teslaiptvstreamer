version: '3.8'

services:
  tesla-iptv:
    image: node:18-alpine
    container_name: tesla-iptv-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - /opt/tesla-iptv:/app
    environment:
      - NODE_ENV=production
      - PORT=3000
    command: node /app/proxy-server.js
    networks:
      - tesla-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tesla-iptv-tunnel
    restart: unless-stopped
    command: tunnel --url http://tesla-iptv:3000
    depends_on:
      - tesla-iptv
    networks:
      - tesla-network

networks:
  tesla-network:
    driver: bridge
